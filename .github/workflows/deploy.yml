name: test-and-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-activity-api
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # VPS host key is pinned; a mismatch aborts the deploy
          echo '198.23.235.130 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKg1LAWmZqZefOvu8L4xyplnOVseqKr5z+9m4JVdDdqt' >> ~/.ssh/known_hosts

      - name: Pull and restart on the VPS
        run: ssh maddox@198.23.235.130 'cd ~/apps/activity-api && git pull --ff-only && npm ci --omit=dev && pm2 restart activity-api'

      - name: Health check
        run: |
          sleep 3
          curl -fsS https://api.maddox-duke.com/health | grep -q '"ok":true'
